<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src file: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:'Inter','Segoe UI',system-ui,sans-serif;user-select:none;cursor:grab}
  body:active{cursor:grabbing}
  #stage{position:relative;width:168px;height:196px;display:grid;place-items:center}
  .glow{position:absolute;bottom:34px;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle,rgba(224,48,30,.45),rgba(224,48,30,.12) 46%,transparent 68%);
    filter:blur(10px);animation:pulse 3.2s ease-in-out infinite}
  .ring{position:absolute;bottom:24px;width:140px;height:140px;border-radius:50%;opacity:.65;
    background:conic-gradient(from 0deg,transparent,#ff4634 80deg,#e0301e 120deg,transparent 220deg,transparent 360deg);
    -webkit-mask:radial-gradient(circle,transparent 60%,#000 61%,#000 66%,transparent 67%);
    animation:spin 12s linear infinite}
  .pet{position:relative;z-index:2;width:132px;height:auto;
    filter:drop-shadow(0 14px 16px rgba(224,48,30,.4));animation:bob 4s ease-in-out infinite;
    transition:transform .18s ease}
  .pet:hover{transform:scale(1.06)}
  .shadow{position:absolute;bottom:20px;width:96px;height:14px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(224,48,30,.28),transparent 70%);filter:blur(4px);z-index:1;
    animation:sway 4s ease-in-out infinite}
  .bubble{position:absolute;top:2px;left:50%;transform:translateX(-50%) scale(.9);
    background:#fff;color:#16110f;font-size:11px;font-weight:800;padding:5px 11px;border-radius:12px;
    box-shadow:0 8px 20px -8px rgba(224,48,30,.5);white-space:nowrap;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s}
  .bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:#fff;border-bottom:0}
  #stage:hover .bubble{opacity:1;transform:translateX(-50%) scale(1)}
  .hide{position:absolute;top:4px;right:6px;z-index:5;width:20px;height:20px;border-radius:50%;
    border:none;background:rgba(255,255,255,.9);color:#b01206;font-weight:900;font-size:13px;line-height:1;
    cursor:pointer;opacity:0;transition:opacity .2s;box-shadow:0 4px 10px -3px rgba(0,0,0,.3);-webkit-app-region:no-drag}
  #stage:hover .hide{opacity:1}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes sway{0%,100%{transform:scaleX(.85);opacity:.7}50%{transform:scaleX(1.05);opacity:1}}
  @keyframes pulse{0%,100%{transform:scale(.92);opacity:.7}50%{transform:scale(1.08);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div id="stage">
    <button class="hide" id="hide" title="Dismiss buddy">×</button>
    <div class="bubble">Open Trackix ✦</div>
    <div class="glow"></div>
    <div class="ring"></div>
    <img class="pet" id="pet" alt="Trackix buddy" draggable="false" />
    <div class="shadow"></div>
  </div>
<script>
  const pet = document.getElementById('pet');
  const SPIRAL = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="g" cx="38%" cy="32%" r="80%"><stop offset="0%" stop-color="%23ff5a48"/><stop offset="55%" stop-color="%23e0301e"/><stop offset="100%" stop-color="%23b01206"/></radialGradient></defs><circle cx="50" cy="50" r="46" fill="url(%23g)"/><path d="M50 50 a8 8 0 1 1 -10 6 a16 16 0 1 0 24 -10 a26 26 0 1 1 -34 22" fill="none" stroke="%23fff" stroke-width="6" stroke-linecap="round"/><circle cx="50" cy="50" r="3.4" fill="%23fff"/></svg>');
  (async () => {
    try { const url = await window.buddy.mascot(); pet.src = url; } catch { pet.src = SPIRAL; }
  })();
  pet.onerror = () => { pet.src = SPIRAL; };

  document.getElementById('hide').addEventListener('click', (e) => { e.stopPropagation(); window.buddy.hide(); });

  // Drag to move the whole window; a click (no real movement) opens the app.
  let down = false, moved = false, sx = 0, sy = 0, wx = 0, wy = 0;
  pet.addEventListener('pointerdown', async (e) => {
    down = true; moved = false; sx = e.screenX; sy = e.screenY;
    const [px, py] = await window.buddy.getPos(); wx = px; wy = py;
    pet.setPointerCapture(e.pointerId);
  });
  pet.addEventListener('pointermove', (e) => {
    if (!down) return;
    const dx = e.screenX - sx, dy = e.screenY - sy;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    if (moved) window.buddy.setPos(wx + dx, wy + dy);
  });
  pet.addEventListener('pointerup', () => {
    if (down && !moved) window.buddy.openMain();
    down = false;
  });
</script>
</body>
</html>
