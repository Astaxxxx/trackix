    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      self. This is a defense-in-depth measure for the renderer.

      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' http://localhost:11434; script-src 'self'"
    />

  </head>

    <script type="module" src="/src/main.tsx"></script>
